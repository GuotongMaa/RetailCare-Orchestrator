services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: retailcare
      POSTGRES_PASSWORD: retailcare
      POSTGRES_DB: retailcare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailcare"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:1.5.9
    ports:
      - "${CHROMA_HOST_PORT:-8001}:8000"
    volumes:
      - chromadata:/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://retailcare:retailcare@postgres:5432/retailcare
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    env_file:
      - path: .env
        required: false
      - path: .claude/.env
        required: false
    ports:
      - "8080:8080"
    profiles: ["full"]   # `docker compose --profile full up` to run the app too

volumes:
  pgdata:
  chromadata:
