name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # CI pins 3.12 (broad wheel support); dev verified on 3.14 too
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check src tests eval
      - name: Unit tests (no real model calls)
        run: PYTHONPATH=src python -m pytest

      - name: Eval-regression gate (model-free safety decisions)
        run: PYTHONPATH=src python -m eval.regression
        # Turns the build RED if a guardrail/policy decision regresses (e.g. high-value
        # refunds stop escalating). No model calls / no secrets — runs on every push.
        # Full model-based eval (pass^k, ablations) runs locally; to enable in CI add
        # DEEPSEEK_API_KEY as a repo secret and a gated job.
